<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Star Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --ink: #f4eef7;
  --ink-soft: #c8b8d8;
  --ink-mute: #7a6f8c;
  --hairline: rgba(255, 255, 255, 0.1);
  --serif: 'Cormorant Garamond', 'Noto Serif SC', serif;
  --serif-zh: 'Noto Serif SC', serif;
  --sans: 'Space Grotesk', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #060418;
  color: var(--ink);
  font-family: var(--sans);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  cursor: default;
}

/* ============= 双层 Canvas ============= */
.cosmos-bg-canvas, .cosmos-canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  touch-action: none;
}
.cosmos-bg-canvas { z-index: 0; }
.cosmos-canvas { z-index: 1; }

/* ============= 顶部品牌 ============= */
.brand {
  position: fixed; top: 26px; left: 28px; z-index: 10;
  display: flex; align-items: center; gap: 14px;
  pointer-events: none;
}
.brand-mark {
  width: 38px; height: 38px;
  display: grid; place-items: center;
  border-radius: 50%;
  color: hsla(280, 90%, 85%, 0.95);
  filter: drop-shadow(0 0 14px hsla(280, 100%, 70%, 0.6));
  animation: markBreath 4s ease-in-out infinite;
}
@keyframes markBreath {
  0%, 100% { filter: drop-shadow(0 0 14px hsla(280, 100%, 70%, 0.5)); transform: scale(1); }
  50%      { filter: drop-shadow(0 0 22px hsla(280, 100%, 80%, 0.95)); transform: scale(1.06); }
}
.brand h1 {
  font-family: var(--serif-zh);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: 0.18em;
  color: var(--ink);
}
.brand p {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
  margin-top: 2px;
}

/* ============= 顶部右侧控制按钮 ============= */
.top-controls {
  position: fixed; top: 22px; right: 22px; z-index: 20;
  display: flex; gap: 8px;
}
.ctrl-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: rgba(20, 14, 40, 0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 0.5px solid rgba(255, 255, 255, 0.14);
  border-radius: 10px;
  color: var(--ink-soft);
  font-family: var(--serif-zh);
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.ctrl-btn:hover {
  background: rgba(40, 28, 70, 0.75);
  border-color: hsla(280, 80%, 70%, 0.5);
  color: var(--ink);
  box-shadow: 0 0 16px hsla(280, 80%, 60%, 0.3);
}
.ctrl-btn svg { stroke: currentColor; }

.ctrl-btn.connect-mode-active {
	  background: rgba(50, 40, 10, 0.65);
	  border-color: hsla(50, 100%, 70%, 0.55);
	  color: hsla(50, 100%, 88%, 1);
	  box-shadow: 0 0 16px hsla(50, 80%, 65%, 0.35);
	}
.ctrl-btn.music-on {
  background: rgba(20, 40, 60, 0.65);
  border-color: hsla(200, 80%, 70%, 0.55);
  color: hsla(200, 100%, 88%, 1);
  box-shadow: 0 0 16px hsla(200, 80%, 65%, 0.35);
}
.ctrl-btn.music-on svg {
  animation: musicPulse 1.8s ease-in-out infinite;
}
@keyframes musicPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.6; transform: scale(0.88); }
}
/* ============= 控制面板 ============= */
.ctrl-panel {
  position: fixed; top: 70px; right: 22px; z-index: 25;
  width: 280px;
  background: linear-gradient(180deg, rgba(28,18,52,0.92), rgba(14,10,32,0.96));
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 0.5px solid rgba(255, 255, 255, 0.14);
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 60px hsla(280, 80%, 50%, 0.15);
  overflow: hidden;
  animation: panelIn 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.96); }
  to { opacity: 1; transform: none; }
}
.ctrl-panel-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 0.5px solid var(--hairline);
  font-family: var(--serif-zh);
  font-size: 13px;
  letter-spacing: 0.14em;
  color: var(--ink);
}
.ctrl-panel-hd button {
  background: transparent; border: 0; color: var(--ink-mute);
  cursor: pointer; font-size: 14px; padding: 4px 8px;
}
.ctrl-panel-hd button:hover { color: var(--ink); }
.ctrl-panel-body {
  padding: 12px 16px 16px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
}
.ctrl-section {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin: 12px 0 8px;
}
.ctrl-section:first-child { margin-top: 0; }

.theme-chips {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.theme-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--ink-soft);
}
.theme-chip:hover { background: rgba(255,255,255,0.08); }
.theme-chip.on {
  background: rgba(255,255,255,0.1);
  border-color: hsla(280, 80%, 70%, 0.6);
  color: var(--ink);
  box-shadow: 0 0 12px hsla(280, 80%, 60%, 0.3) inset;
}
.theme-swatch {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--c1), var(--c2));
  box-shadow: 0 0 8px var(--c1);
  flex-shrink: 0;
}
.theme-label {
  font-family: var(--serif-zh);
  font-size: 11px;
  letter-spacing: 0.05em;
}

.ctrl-panel-body input[type=range] {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 999px;
  outline: none;
}
.ctrl-panel-body input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: hsla(280, 90%, 85%, 1);
  box-shadow: 0 0 10px hsla(280, 100%, 70%, 0.7);
  cursor: pointer;
}
.ctrl-panel-body input[type=range]::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%; border: 0;
  background: hsla(280, 90%, 85%, 1);
  box-shadow: 0 0 10px hsla(280, 100%, 70%, 0.7);
  cursor: pointer;
}

.ctrl-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0;
  font-family: var(--serif-zh);
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.06em;
  margin-top: 4px;
}
.mini-toggle {
  position: relative;
  width: 30px; height: 16px;
  background: rgba(255,255,255,0.1);
  border: 0; border-radius: 999px;
  cursor: pointer;
  transition: background 0.2s;
}
.mini-toggle.on { background: hsla(280, 80%, 65%, 1); }
.mini-toggle i {
  position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.mini-toggle.on i { transform: translateX(14px); }

.ctrl-danger {
  display: block; width: 100%;
  padding: 10px;
  margin-top: 14px;
  background: transparent;
  border: 0.5px solid hsla(0, 60%, 60%, 0.4);
  border-radius: 8px;
  color: hsla(0, 70%, 80%, 1);
  font-family: var(--serif-zh);
  font-size: 12px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
}
.ctrl-danger:hover {
  background: hsla(0, 60%, 30%, 0.2);
  border-color: hsla(0, 70%, 70%, 0.7);
}

/* ============= 底部 HUD ============= */
.hud {
  position: fixed; bottom: 24px; left: 0; right: 0; z-index: 10;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  pointer-events: none;
}
.hud-count {
  color: var(--ink-soft);
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.hud-hint {
  color: var(--ink-mute);
  font-size: 10px;
  letter-spacing: 0.16em;
  white-space: nowrap;
  max-width: calc(100vw - 32px);
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

/* ============= 新手提示 ============= */
.hint-bubble {
  position: fixed; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  display: flex; align-items: center; gap: 12px;
  padding: 14px 22px;
  background: rgba(20, 14, 40, 0.4);
  backdrop-filter: blur(14px);
  border: 0.5px solid rgba(255, 255, 255, 0.1);
  border-radius: 999px;
  font-family: var(--serif-zh);
  font-size: 14px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  pointer-events: none;
  animation: hintFloat 4s ease-in-out infinite;
}
.hint-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: hsla(280, 100%, 80%, 1);
  box-shadow: 0 0 12px hsla(280, 100%, 80%, 1);
  animation: hintPulse 1.6s ease-in-out infinite;
}
@keyframes hintFloat {
  0%, 100% { transform: translate(-50%, -50%); }
  50% { transform: translate(-50%, calc(-50% - 6px)); }
}
@keyframes hintPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.6); opacity: 0.4; }
}

/* ============= 模态框 ============= */
.modal-bd, .card-bd {
  position: fixed; inset: 0; z-index: 100;
  display: grid; place-items: center;
  background: rgba(5, 4, 16, 0.55);
  backdrop-filter: blur(8px);
  animation: modalFade 0.3s ease both;
}
@keyframes modalFade { from { opacity: 0; } to { opacity: 1; } }
.modal {
  position: relative;
  width: min(420px, 92vw);
  padding: 36px 32px 28px;
  background: linear-gradient(180deg, rgba(28, 18, 52, 0.85), rgba(14, 10, 32, 0.92));
  border: 0.5px solid rgba(255, 255, 255, 0.12);
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 80px hsla(280, 80%, 50%, 0.15);
  overflow: hidden;
  animation: modalRise 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
}
@keyframes modalRise {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to { opacity: 1; transform: none; }
}
.modal-glow {
  position: absolute; top: -40%; left: 50%;
  width: 200%; height: 100%;
  background: radial-gradient(ellipse 30% 60% at 50% 50%, hsla(280, 100%, 70%, 0.35) 0%, transparent 70%);
  transform: translateX(-50%);
  pointer-events: none;
  filter: blur(20px);
}
.modal-glow.companion {
  background: radial-gradient(ellipse 30% 60% at 50% 50%, hsla(40, 100%, 70%, 0.3) 0%, transparent 70%);
}
.modal h2 {
  font-family: var(--serif-zh);
  font-weight: 500;
  font-size: 26px;
  letter-spacing: 0.12em;
  position: relative;
}
.modal-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-mute);
  margin: 6px 0 24px;
  position: relative;
}
.modal-sub em { color: hsla(280, 80%, 80%, 1); }
.modal label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin: 0 0 8px;
  position: relative;
}
.modal input, .modal textarea {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.04);
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  border-radius: 10px;
  color: var(--ink);
  font-family: var(--serif-zh);
  font-size: 15px;
  margin-bottom: 18px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.modal input:focus, .modal textarea:focus {
  border-color: hsla(280, 80%, 70%, 0.6);
  background: rgba(255, 255, 255, 0.06);
}
.modal textarea { resize: none; min-height: 80px; line-height: 1.6; }
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 8px;
  position: relative;
}
.btn-primary, .btn-ghost {
  padding: 10px 22px;
  font-family: var(--serif-zh);
  font-size: 14px;
  letter-spacing: 0.1em;
  border-radius: 999px;
  border: 0.5px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, hsla(280, 80%, 65%, 0.9), hsla(220, 80%, 65%, 0.9));
  color: white;
  box-shadow: 0 6px 24px hsla(280, 80%, 50%, 0.4);
}
.btn-primary:hover {
  box-shadow: 0 8px 32px hsla(280, 80%, 60%, 0.6);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent;
  border-color: rgba(255, 255, 255, 0.15);
  color: var(--ink-soft);
}
.btn-ghost:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.25);
}

/* 伴星预览 */
.companion-preview {
  position: relative; height: 130px;
  margin: -8px 0 16px;
  display: grid; place-items: center;
}
.cp-host {
  position: absolute;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: hsla(280, 90%, 75%, 1);
  box-shadow: 0 0 30px hsla(280, 100%, 70%, 1), 0 0 60px hsla(280, 100%, 70%, 0.7);
  animation: cardStarBreath 3s ease-in-out infinite;
}
.cp-orbit {
  position: absolute;
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 0.5px dashed rgba(255, 255, 255, 0.25);
  animation: orbitSpin 8s linear infinite;
}
.cp-comp {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: hsla(40, 100%, 80%, 1);
  box-shadow: 0 0 14px hsla(40, 100%, 70%, 1);
  top: calc(50% - 50px - 4px);
  left: 50%;
  margin-left: -4px;
  transform-origin: 4px 54px;
  animation: orbitOrbit 8s linear infinite;
}
@keyframes orbitSpin { to { transform: rotate(360deg); } }
@keyframes orbitOrbit { to { transform: rotate(360deg); } }

/* 信息卡 */
.info-card {
  position: relative;
  width: min(380px, 92vw);
  padding: 32px 28px;
  background: linear-gradient(180deg, rgba(28, 18, 52, 0.85), rgba(14, 10, 32, 0.92));
  border: 0.5px solid rgba(255, 255, 255, 0.12);
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 80px hsla(var(--star-hue), 80%, 50%, 0.2);
  overflow: hidden;
  animation: modalRise 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.1) both;
}
.info-glow {
  position: absolute; top: -50%; left: -10%; right: -10%; height: 200%;
  background: radial-gradient(ellipse 40% 30% at 50% 30%, hsla(var(--star-hue), 100%, 70%, 0.35), transparent 70%);
  pointer-events: none;
  filter: blur(20px);
}
.info-star {
  position: relative;
  width: 50px; height: 50px;
  margin: 0 auto 18px;
  background: radial-gradient(circle,
    hsla(var(--star-hue), 100%, 95%, 1) 0%,
    hsla(var(--star-hue), 100%, 70%, 0.7) 40%,
    transparent 70%);
  border-radius: 50%;
  filter: drop-shadow(0 0 20px hsla(var(--star-hue), 100%, 70%, 1));
  animation: cardStarBreath 3s ease-in-out infinite;
}
@keyframes cardStarBreath {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.info-meta { position: relative; text-align: center; }
.info-by {
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-mute);
  display: block;
  margin-bottom: 6px;
}
.info-meta h3 {
  font-family: var(--serif-zh);
  font-weight: 500;
  font-size: 22px;
  letter-spacing: 0.1em;
}
.info-meta p {
  font-family: var(--serif-zh);
  font-size: 15px;
  color: var(--ink-soft);
  margin-top: 16px;
  line-height: 1.7;
  text-wrap: pretty;
}
.info-meta time {
  display: block;
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-mute);
  margin-top: 14px;
  letter-spacing: 0.06em;
}
.info-companions {
  display: inline-block;
  margin-top: 14px;
  padding: 4px 12px;
  font-family: var(--serif-zh);
  font-size: 11px;
  color: hsla(40, 100%, 80%, 1);
  background: hsla(40, 60%, 30%, 0.2);
  border: 0.5px solid hsla(40, 80%, 60%, 0.3);
  border-radius: 999px;
  letter-spacing: 0.08em;
}
.info-x {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: rgba(255, 255, 255, 0.05);
  border: 0.5px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  color: var(--ink-soft);
  font-size: 12px;
  cursor: pointer;
}
.info-x:hover { background: rgba(255, 255, 255, 0.1); }

@media (max-width: 640px) {
  .brand { top: 14px; left: 14px; gap: 10px; }
  .brand-mark { width: 30px; height: 30px; }
  .brand h1 { font-size: 17px; }
  .brand p { display: none; }
  .top-controls {
    top: 58px; right: 14px; gap: 5px;
    flex-wrap: wrap; justify-content: flex-end;
    max-width: calc(100vw - 28px);
  }
  .ctrl-btn { padding: 7px 10px; font-size: 11px; }
  .ctrl-btn span { display: none; }
  .ctrl-panel { width: calc(100vw - 28px); right: 14px; top: 110px; }
  .hud { bottom: 18px; }
  .hud-hint { font-size: 9px; padding: 0 16px; }
  .my-id-badge { bottom: 62px; left: 14px; }
  .visit-banner {
    left: 14px; right: auto; top: 14px;
    max-width: calc(100vw - 210px);
    border-radius: 12px;
    padding: 7px 12px; gap: 8px;
    overflow: hidden; white-space: nowrap;
  }
  .visit-hint-text { display: none; }
  .visit-divider { display: none; }
  .visit-who {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 12px;
  }
  .visit-who strong { font-size: 13px; }
  .visit-return-btn { padding: 4px 10px; font-size: 10px; flex-shrink: 0; }
}

/* ============= 星空编号 ID 徽章 ============= */
.my-id-badge {
  position: fixed; bottom: 68px; left: 28px; z-index: 10;
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px;
  background: rgba(6, 4, 20, 0.62);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 0.5px solid rgba(255,255,255,0.09);
  border-radius: 999px;
}
.id-label {
  font-size: 9px;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.id-code {
  font-family: 'Space Grotesk', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: hsla(185, 80%, 82%, 1);
  text-shadow: 0 0 14px hsla(185, 100%, 70%, 0.45);
}
.id-copy-btn {
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.13);
  border-radius: 6px;
  color: var(--ink-soft);
  font-family: var(--sans);
  font-size: 10px;
  padding: 3px 9px;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.05em;
}
.id-copy-btn:hover { background: rgba(255,255,255,0.12); color: var(--ink); }
.id-copy-btn.copied { color: hsla(140, 80%, 74%, 1); border-color: hsla(140,60%,60%,0.35); }

/* ============= 访客模式浮条 ============= */
.visit-banner {
  position: fixed; top: 14px; left: 28px;
  z-index: 60;
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px;
  background: linear-gradient(90deg, rgba(4,18,34,0.88), rgba(4,22,40,0.92));
  backdrop-filter: blur(20px);

@keyframes whCore {

.wh-ring {

.wh-ring:nth-child(2) { animation: whRing 0.75s cubic-bezier(0.15,0,0.7,1) 0.00s forwards; }

.wh-ring:nth-child(4) { animation: whRing 0.75s cubic-bezier(0.15,0,0.7,1) 0.14s forwards; }
.wh-ring:nth-child(5) { animation: whRing 0.75s cubic-bezier(0.15,0,0.7,1) 0.21s forwards; }

}

/* ============= 探索星空弹窗专属光晕 ============= */
.modal-glow.explore {

}
/* 编号输入框等宽字体 */

}

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="starfield.js?v=3"></script>
<script type="text/babel">
/* ===========================================================
   App.jsx — 交互修复版
   ★ 修复：点击空白始终种星，不再被附近星星劫持
   ★ 添加伴星改为从信息卡内触发（更清晰的 UX）
   ★ 鼠标移动同步更新 3D 旋转目标
   ★ 内联 useTweaks，移除对宿主协议的依赖
   ★ 添加星座连线功能
   =========================================================== */

const { useState, useEffect, useRef, useCallback } = React;

// 内联 useTweaks — 无需依赖外部宿主协议
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback(function (keyOrEdits, val) {
    if (typeof keyOrEdits === 'object' && keyOrEdits !== null) {
      setValues(function (prev) { return Object.assign({}, prev, keyOrEdits); });
    } else {
      var edit = {}; edit[keyOrEdits] = val;
      setValues(function (prev) { return Object.assign({}, prev, edit); });
    }
  }, []);
  return [values, setTweak];
}

const TWEAK_DEFAULTS = {
  theme: "midnight",
  nebulaIntensity: 2,
  twinkleSpeed: 3,
  glowRadius: 2.4,
  orbitSpeed: 1,
  burstCount: 20,
  trailDecay: 0.01,
  cursorTrail: true,
  showHint: true,
  constellationEnabled: true,
  constellationDistance: 500
};

const THEMES = {
  midnight:   { label: 'Midnight Blue', hues: [260, 290, 220], starHue: [200, 320] },
  rosequartz: { label: 'Rose Dreams',  hues: [320, 290, 350], starHue: [280, 360] },
  aurora:     { label: 'Aurora',       hues: [170, 200, 140], starHue: [140, 220] },
  ember:      { label: 'Ember Gold',   hues: [25,  45,  15],  starHue: [15,  60]  },
  ink:        { label: 'Ink',          hues: [220, 240, 260], starHue: [180, 280] },
};

/* ── 星空编号生成 ── */
const CONSTELLATIONS = ['AND','AQL','ARI','AUR','BOO','CAR','CAS','CEN','CYG','DRA',
  'ERI','GEM','HER','HYA','LEO','LYR','ORI','PEG','PER','PHO','PSC','SAG','SCO','TAU','UMA','VIR','VUL'];
function genUserId() {
  const con = CONSTELLATIONS[Math.floor(Math.random() * CONSTELLATIONS.length)];
  const num = String(Math.floor(Math.random() * 9000) + 1000);
  return con + '-' + num;
}
function getOrCreateUserId() {
  let id = localStorage.getItem('star-garden.myId');
  if (!id) { id = genUserId(); localStorage.setItem('star-garden.myId', id); }
  return id;
}

/* ── 多花园存储（localStorage 缓存 + 服务器同步）── */
const GARDEN_KEY = id => 'star-garden.' + id;
const CONN_KEY   = id => 'star-garden.' + id + '.conn';
const LEGACY_STARS_KEY = 'star-garden.stars';
const LEGACY_CONN_KEY  = 'star-garden.connections';

/* 将旧版数据迁移到新格式 */
function migrateLegacy(myId) {
  const oldStars = localStorage.getItem(LEGACY_STARS_KEY);
  const oldConns = localStorage.getItem(LEGACY_CONN_KEY);
  if (oldStars && !localStorage.getItem(GARDEN_KEY(myId))) {
    localStorage.setItem(GARDEN_KEY(myId), oldStars);
  }
  if (oldConns && !localStorage.getItem(CONN_KEY(myId))) {
    localStorage.setItem(CONN_KEY(myId), oldConns);
  }
}

/* 序列化辅助 */
function serializeStars(stars) {
  return stars.map(s => ({
    id: s.id, x: s.x, y: s.y, r: s.r, hue: s.hue,
    planter: s.planter, message: s.message, bornAt: s.bornAt,
    companions: s.companions.map(c => ({
      r: c.r, theta: c.theta, omega: c.omega, hue: c.hue, size: c.size, message: c.message
    }))
  }));
}

/* 从服务器加载花园，失败时退回 localStorage */
async function fetchGarden(id) {
  try {
    const res = await fetch('/api/garden/' + id);
    if (!res.ok) throw new Error(res.status);
    const { stars, connections } = await res.json();
    /* 同步写入 localStorage 缓存 */
    localStorage.setItem(GARDEN_KEY(id), JSON.stringify(stars));
    localStorage.setItem(CONN_KEY(id), JSON.stringify(connections));
    return { stars, connections };
  } catch {
    /* 离线 / 服务器不可用时读本地缓存 */
    try {
      const stars = JSON.parse(localStorage.getItem(GARDEN_KEY(id)) || '[]');
      const connections = JSON.parse(localStorage.getItem(CONN_KEY(id)) || '[]');
      return { stars, connections };
    } catch { return { stars: [], connections: [] }; }
  }
}

/* 保存花园：立即写 localStorage，后台推送服务器 */
function pushGarden(id, stars, conns) {
  const starData = serializeStars(stars);
  const connData = conns || [];
  localStorage.setItem(GARDEN_KEY(id), JSON.stringify(starData));
  localStorage.setItem(CONN_KEY(id), JSON.stringify(connData));
  fetch('/api/garden/' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ stars: starData, connections: connData }),
  }).catch(() => {});
}

/* 访客添加单个伴星（不需要发送整个花园） */
function pushCompanion(hostId, starId, c) {
  fetch('/api/garden/' + hostId + '/companion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ starId, companion: c }),
  }).catch(() => {});
  /* 同步更新本地缓存中该花园的数据 */
  try {
    const stars = JSON.parse(localStorage.getItem(GARDEN_KEY(hostId)) || '[]');
    const star = stars.find(s => s.id === starId);
    if (star) { star.companions = star.companions || []; star.companions.push(c); }
    localStorage.setItem(GARDEN_KEY(hostId), JSON.stringify(stars));
  } catch {}
}

function App() {
  const canvasRef   = useRef(null);
  const bgCanvasRef = useRef(null);
  const fieldRef    = useRef(null);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  /* 星空编号 */
  const [userId] = useState(() => {
    const id = getOrCreateUserId();
    migrateLegacy(id);
    return id;
  });
  const [visitMode,      setVisitMode]      = useState(false);
  const [visitingId,     setVisitingId]     = useState('');
  const [showVisitModal, setShowVisitModal] = useState(false);
  const [visitInput,     setVisitInput]     = useState('');
  const [visitError,     setVisitError]     = useState('');
  const [idCopied,       setIdCopied]       = useState(false);
  const [showToast,      setShowToast]      = useState(false);
  const [wormhole,       setWormhole]       = useState(null); // null | 'in' | 'out'
  const visitModeRef  = useRef(false);
  const visitingIdRef = useRef('');
  const userIdRef     = useRef(userId);

  const [planting,          setPlanting]          = useState(null);
  const [pendingCompanion,  setPendingCompanion]  = useState(null);
  const [companionMessage,  setCompanionMessage]  = useState('');
  const [selected,          setSelected]          = useState(null);
  const [planterName,       setPlanterName]       = useState(() => localStorage.getItem('planter-name') || '');
  const [message,           setMessage]           = useState('');
  const [hint,              setHint]              = useState(true);
  const [count,             setCount]             = useState(0);
  const [showControls,      setShowControls]      = useState(false);
  const [connectMode,       setConnectMode]       = useState(false);
  const [connectingFrom,    setConnectingFrom]    = useState(null);
  const [connCount,         setConnCount]         = useState(0);

  const connectModeRef    = useRef(false);
  const connectingFromRef = useRef(null);
  const audioRef          = useRef(null);
  const [musicOn, setMusicOn] = useState(false);

  const theme = THEMES[t.theme] || THEMES.midnight;

  /* ── 定位到所有星星 ── */
  const fitStars = useCallback(() => {
    const field  = fieldRef.current;
    const canvas = canvasRef.current;
    if (!field || !canvas || field.stars.length === 0) return;
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (const s of field.stars) {
      minX = Math.min(minX, s.x); maxX = Math.max(maxX, s.x);
      minY = Math.min(minY, s.y); maxY = Math.max(maxY, s.y);
    }
    const W = canvas.clientWidth, H = canvas.clientHeight;
    const pad = 120;
    const scaleX = W / (maxX - minX + pad * 2);
    const scaleY = H / (maxY - minY + pad * 2);
    const newScale = Math.min(Math.max(Math.min(scaleX, scaleY), 0.4), 1.2);
    window.STARFIELD.view.x           = W / 2 - (minX + maxX) / 2;
    window.STARFIELD.view.y           = H / 2 - (minY + maxY) / 2;
    window.STARFIELD.view.scale       = newScale;
    window.STARFIELD.view.targetScale = newScale;
  }, []);

  /* ── 花园切换工具函数 ── */
  const loadGardenIntoField = useCallback((stars, conns) => {
    const field = fieldRef.current;
    if (!field) return;
    field.stars = [];
    field.connections = [];
    for (const d of stars) {
      const s = field.addStar(d.x, d.y, {
        id: d.id, r: d.r, hue: d.hue,
        planter: d.planter, message: d.message, bornAt: d.bornAt, silent: true,
      });
      s.spawnT = 1;
      for (const c of (d.companions || [])) field.addCompanion(s, { ...c, silent: true });
    }
    const starIdSet = new Set(field.stars.map(s => s.id));
    field.connections = (conns || []).filter(c => starIdSet.has(c.starA) && starIdSet.has(c.starB));
    setCount(field.stars.length);
    setConnCount(field.connections.length);
    /* 自动定位到星星，没有星星时重置视角 */
    if (field.stars.length > 0) {
      setTimeout(fitStars, 30); /* 等 canvas 尺寸稳定后再计算 */
    } else {
      window.STARFIELD.view.x = 0; window.STARFIELD.view.y = 0;
      window.STARFIELD.view.scale = 0.4; window.STARFIELD.view.targetScale = 0.4;
    }
  }, [fitStars]);

  const enterVisitMode = useCallback(async (rawId) => {
    const targetId = rawId.trim().toUpperCase();
    if (!targetId) { setVisitError('Please enter a garden ID.'); return; }
    if (targetId === userIdRef.current) { setVisitError("That's your own garden!"); return; }
    setVisitError('Connecting…');
    const { stars, connections } = await fetchGarden(targetId);
    if (stars.length === 0) {
      setVisitError('Garden not found — check the ID, or the owner hasn\'t planted any stars yet.');
      return;
    }
    /* 关弹窗，启动虫洞入场 */
    setShowVisitModal(false); setVisitInput(''); setVisitError('');
    setSelected(null); setPlanting(null);
    setWormhole('in');
    await new Promise(r => setTimeout(r, 650));   /* 等屏幕暗透 */
    loadGardenIntoField(stars, connections);
    visitModeRef.current  = true;
    visitingIdRef.current = targetId;
    setVisitMode(true);
    setVisitingId(targetId);
    setWormhole('out');
    await new Promise(r => setTimeout(r, 900));
    setWormhole(null);
  }, [loadGardenIntoField]);

  const enterRandomGarden = useCallback(async () => {
    try {
      const res = await fetch('/api/gardens/random?exclude=' + userIdRef.current);
      if (!res.ok) {
        setVisitError('还没有其他人的星空，成为第一个种星的人吧！');
        setShowVisitModal(true);
        return;
      }
      const { id } = await res.json();
      await enterVisitMode(id);
    } catch {
      setVisitError('无法连接到服务器，请稍后再试。');
      setShowVisitModal(true);
    }
  }, [enterVisitMode]);

  const exitVisitMode = useCallback(async () => {
    const { stars, connections } = await fetchGarden(userIdRef.current);
    setWormhole('in');
    await new Promise(r => setTimeout(r, 650));
    loadGardenIntoField(stars, connections);
    visitModeRef.current  = false;
    visitingIdRef.current = '';
    setVisitMode(false);
    setVisitingId('');
    setSelected(null);
    setWormhole('out');
    await new Promise(r => setTimeout(r, 900));
    setWormhole(null);
  }, [loadGardenIntoField]);

  /* 配置同步 */
  useEffect(() => {
    if (!window.STARFIELD) return;
    window.STARFIELD.setConfig({
      nebulaIntensity      : t.nebulaIntensity,
      nebulaHues           : theme.hues,
      starHueRange         : theme.starHue,
      twinkleSpeed         : t.twinkleSpeed,
      glowRadius           : t.glowRadius,
      orbitSpeed           : t.orbitSpeed,
      burstCount           : t.burstCount,
      trailDecay           : t.trailDecay,
      cursorTrail          : t.cursorTrail,
      constellationEnabled : t.constellationEnabled,
      constellationMaxDist : t.constellationDistance,
    });
  }, [t, theme]);

  /* 背景音乐：自动尝试播放，被拦截时等首次交互 */
  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    audio.volume = 0.3;
    audio.currentTime = 30;
    let interactFn = null;
    audio.play().then(() => setMusicOn(true)).catch(() => {
      interactFn = () => audio.play().then(() => setMusicOn(true)).catch(() => {});
      window.addEventListener('pointerdown', interactFn, { once: true });
    });
    return () => { if (interactFn) window.removeEventListener('pointerdown', interactFn); };
  }, []);

  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    if (musicOn) { audio.play().catch(() => setMusicOn(false)); }
    else { audio.pause(); }
  }, [musicOn]);

  /* 主题切换时重新生成星云和背景星星 */
  useEffect(() => {
    if (!fieldRef.current) return;
    fieldRef.current.resize();
  }, [t.theme]);

  /* 初始化引擎 + 事件 */
  useEffect(() => {
    const field = new window.STARFIELD.Starfield(canvasRef.current, bgCanvasRef.current);
    fieldRef.current = field;
    const onResize = () => field.resize();
    field.resize();
    window.addEventListener('resize', onResize);

    /* 加载已保存星星（自己的花园，优先从服务器拉取） */
    const myId = userIdRef.current;
    fetchGarden(myId).then(({ stars: saved, connections: savedConns }) => {
      for (const d of saved) {
        const s = field.addStar(d.x, d.y, {
          id: d.id, r: d.r, hue: d.hue,
          planter: d.planter, message: d.message, bornAt: d.bornAt, silent: true,
        });
        s.spawnT = 1;
        for (const c of (d.companions || [])) field.addCompanion(s, { ...c, silent: true });
      }
      setCount(field.stars.length);

      const starIdSet = new Set(field.stars.map(s => s.id));
      const validConns = (savedConns || []).filter(c => starIdSet.has(c.starA) && starIdSet.has(c.starB));
      field.connections = validConns;
      setConnCount(validConns.length);
      if (field.stars.length > 0) setTimeout(fitStars, 50);
    });
    field.on('star-added', () => setCount(field.stars.length));

    field.on('connection-added', function() {
      const curId = visitModeRef.current ? visitingIdRef.current : userIdRef.current;
      pushGarden(curId, field.stars, field.connections);
      setConnCount(field.connections.length);
    });
    field.on('connection-removed', function() {
      const curId = visitModeRef.current ? visitingIdRef.current : userIdRef.current;
      pushGarden(curId, field.stars, field.connections);
      setConnCount(field.connections.length);
    });

    const canvas = canvasRef.current;
    let downX = 0, downY = 0, dragX = 0, dragY = 0, isDown = false, moved = false, lastBgRipple = 0;
    let pinching = false, lastPinchDist = 0;

    const screenToWorld = (cx, cy) => {
      const r  = canvas.getBoundingClientRect();
      const sx = cx - r.left, sy = cy - r.top;
      return {
        x: (sx - r.width  / 2) / window.STARFIELD.view.scale + r.width  / 2 - window.STARFIELD.view.x,
        y: (sy - r.height / 2) / window.STARFIELD.view.scale + r.height / 2 - window.STARFIELD.view.y,
      };
    };

    const onPointerDown = (e) => {
      if (pinching) return;
      isDown = true; moved = false;
      downX  = e.clientX; downY = e.clientY;
      dragX  = window.STARFIELD.view.x; dragY = window.STARFIELD.view.y;
    };

    const onPointerMove = (e) => {
      const r  = canvas.getBoundingClientRect();
      const w2 = r.width  / 2, h2 = r.height / 2;
      const sx = e.clientX - r.left, sy = e.clientY - r.top;
      const wc = screenToWorld(e.clientX, e.clientY);

      field.cursor.worldX  = wc.x; field.cursor.worldY = wc.y;
      field.cursor.screenX = sx;   field.cursor.screenY = sy;
      field.emitCursorDust(wc.x, wc.y);

      /* 更新 3D 旋转目标（鼠标位置驱动，±0.5 范围） */
      field.setMouseRotation((sx - w2) / r.width, (sy - h2) / r.height);

      if (isDown) {
        const dx = e.clientX - downX, dy = e.clientY - downY;
        if (Math.abs(dx) + Math.abs(dy) > 4) {
          moved = true;
          const now = performance.now();
          if (now - lastBgRipple > 80) {
            field.addBgRipple(sx, sy);
            lastBgRipple = now;
          }
        }
        window.STARFIELD.view.x = dragX + dx / window.STARFIELD.view.scale;
        window.STARFIELD.view.y = dragY + dy / window.STARFIELD.view.scale;
      } else {
        field.hoverStar = field.findNearestStar(wc.x, wc.y);
        if (connectModeRef.current) {
          canvas.style.cursor = field.hoverStar ? 'copy' : 'crosshair';
        } else {
          canvas.style.cursor = field.hoverStar ? 'pointer' : 'default';
        }
      }
    };

    const onPointerUp = (e) => {
      if (!isDown || pinching) return;
      isDown = false;
      if (moved) return;

      const wc  = screenToWorld(e.clientX, e.clientY);
      const hit = field.hitTest(wc.x, wc.y);

      if (connectModeRef.current) {
        if (hit) {
          if (connectingFromRef.current) {
            if (connectingFromRef.current.id === hit.id) {
              connectingFromRef.current = null;
              setConnectingFrom(null);
            } else {
              /* 检查是否已存在连线 */
              var existing = null;
              for (var _eci = 0; _eci < field.connections.length; _eci++) {
                var _ec = field.connections[_eci];
                if ((_ec.starA === connectingFromRef.current.id && _ec.starB === hit.id) ||
                    (_ec.starA === hit.id && _ec.starB === connectingFromRef.current.id)) {
                  existing = _ec; break;
                }
              }
              if (existing) {
                field.removeConnection(existing.id);
              } else {
                var name = planterName.trim() || 'Anonymous';
                field.addConnection(connectingFromRef.current.id, hit.id, name);
              }
              connectingFromRef.current = null;
              setConnectingFrom(null);
            }
          } else {
            connectingFromRef.current = hit;
            setConnectingFrom(hit);
          }
        } else {
          /* 点击空白：检查是否点到连线 */
          var connHit = field.hitTestConnection(wc.x, wc.y);
          if (connHit) {
            if (window.confirm('Delete this constellation line?')) {
              field.removeConnection(connHit.id);
            }
          }
          connectingFromRef.current = null;
          setConnectingFrom(null);
        }
      } else {
        if (hit) {
          setSelected(hit);
        } else if (visitModeRef.current) {
          setShowToast(true);
          setTimeout(() => setShowToast(false), 2200);
        } else {
          setPlanting({ worldX: wc.x, worldY: wc.y });
        }
        setHint(false);
      }
    };

    const onWheel = (e) => {
      e.preventDefault();
      const f = e.deltaY > 0 ? 0.9 : 1.1;
      window.STARFIELD.view.targetScale = Math.max(0.4, Math.min(3.5, window.STARFIELD.view.targetScale * f));
    };

    /* 双指捏合缩放 */
    const onTouchStart = (e) => {
      if (e.touches.length === 2) {
        pinching = true; isDown = false;
        const t0 = e.touches[0], t1 = e.touches[1];
        lastPinchDist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
        e.preventDefault();
      }
    };
    const onTouchMove = (e) => {
      if (e.touches.length === 2 && pinching) {
        const t0 = e.touches[0], t1 = e.touches[1];
        const dist = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY);
        if (lastPinchDist > 0) {
          const f = dist / lastPinchDist;
          window.STARFIELD.view.targetScale = Math.max(0.4, Math.min(3.5,
            window.STARFIELD.view.targetScale * f));
        }
        lastPinchDist = dist;
        e.preventDefault();
      }
    };
    const onTouchEnd = (e) => {
      if (e.touches.length < 2) {
        pinching = false; lastPinchDist = 0;
        isDown = false; moved = true; /* 捏合结束后不触发 tap */
      }
    };

    canvas.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup',   onPointerUp);
    canvas.addEventListener('wheel',       onWheel,      { passive: false });
    canvas.addEventListener('touchstart',  onTouchStart, { passive: false });
    canvas.addEventListener('touchmove',   onTouchMove,  { passive: false });
    canvas.addEventListener('touchend',    onTouchEnd);
    return () => {
      window.removeEventListener('resize',      onResize);
      canvas.removeEventListener('pointerdown', onPointerDown);
      window.removeEventListener('pointermove', onPointerMove);
      window.removeEventListener('pointerup',   onPointerUp);
      canvas.removeEventListener('wheel',       onWheel);
      canvas.removeEventListener('touchstart',  onTouchStart);
      canvas.removeEventListener('touchmove',   onTouchMove);
      canvas.removeEventListener('touchend',    onTouchEnd);
    };
  }, []);

  /* 种星 */
  const submitStar = useCallback(() => {
    if (!planting || !fieldRef.current) return;
    const name = planterName.trim() || 'Anonymous';
    localStorage.setItem('planter-name', name);
    fieldRef.current.addStar(planting.worldX, planting.worldY, {
      planter: name, message: message.trim(),
    });
    pushGarden(userIdRef.current, fieldRef.current.stars, fieldRef.current.connections);
    setPlanting(null); setMessage('');
  }, [planting, planterName, message]);

  /* 添加伴星（从信息卡内触发） */
  const openCompanion = useCallback((host) => {
    setSelected(null);
    setPendingCompanion({ host, theta: Math.random() * Math.PI * 2, orbitR: rand(48, 75) });
  }, []);

  const submitCompanion = useCallback(() => {
    if (!pendingCompanion || !fieldRef.current) return;
    const host = pendingCompanion.host;
    fieldRef.current.addCompanion(host, {
      theta:   pendingCompanion.theta,
      orbitR:  pendingCompanion.orbitR,
      message: companionMessage.trim(),
    });
    if (visitModeRef.current) {
      /* 访客模式：只推送新增的伴星，不修改宿主整个花园 */
      const comp = host.companions[host.companions.length - 1];
      pushCompanion(visitingIdRef.current, host.id, {
        r: comp.r, theta: comp.theta, omega: comp.omega,
        hue: comp.hue, size: comp.size, message: comp.message,
      });
    } else {
      pushGarden(userIdRef.current, fieldRef.current.stars, fieldRef.current.connections);
    }
    setPendingCompanion(null);
    setCompanionMessage('');
  }, [pendingCompanion, companionMessage]);

  useEffect(() => {
    if (fieldRef.current) {
      fieldRef.current.connectingFromId = connectingFrom ? connectingFrom.id : null;
    }
  }, [connectingFrom]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') {
        if (connectingFromRef.current) {
          connectingFromRef.current = null;
          setConnectingFrom(null);
        } else if (connectModeRef.current) {
          connectModeRef.current = false;
          setConnectMode(false);
        } else {
          setPlanting(null); setSelected(null);
          setPendingCompanion(null); setShowControls(false);
        }
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const themeKeys = Object.keys(THEMES);

  return (
    <>
      <canvas ref={bgCanvasRef} className="cosmos-bg-canvas" />
      <canvas ref={canvasRef}   className="cosmos-canvas" />

      {/* 品牌（访客模式下隐藏，位置让给访客横幅） */}
      <header className="brand" style={visitMode ? { opacity: 0, pointerEvents: 'none' } : {}}>
        <div className="brand-mark">
          <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true">
            <path d="M11 2 L12.5 9 L19.5 11 L12.5 13 L11 20 L9.5 13 L2.5 11 L9.5 9 Z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1>Star Garden</h1>
          <p>a garden of wishes in the dark</p>
        </div>
      </header>

      {/* 顶部控制 */}
      <div className="top-controls">
        {!visitMode && <button className="ctrl-btn" title="Settings" onClick={() => setShowControls(v => !v)}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2" stroke="currentColor" strokeWidth="1.4"/>
            <path d="M8 1v2M8 13v2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M1 8h2M13 8h2M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"
                  stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          </svg>
          <span>Settings</span>
        </button>}
        <button className="ctrl-btn" title="Reset View" onClick={() => {
          window.STARFIELD.view.x = 0; window.STARFIELD.view.y = 0;
          window.STARFIELD.view.targetScale = 0.4;
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8a5 5 0 1 0 2-4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
            <path d="M3 4v4h4" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <span>Center</span>
        </button>
        <button className="ctrl-btn" title="Locate Stars" onClick={fitStars}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="3" stroke="currentColor" strokeWidth="1.4"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/>
          </svg>
          <span>Locate</span>
        </button>
        <button className="ctrl-btn" title="Zoom In" onClick={() => {
          window.STARFIELD.view.targetScale = Math.min(3.5, window.STARFIELD.view.targetScale * 1.2);
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 4v8M4 8h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
          </svg>
        </button>
        <button className="ctrl-btn" title="Zoom Out" onClick={() => {
          window.STARFIELD.view.targetScale = Math.max(0.4, window.STARFIELD.view.targetScale / 1.2);
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 8h8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/>
          </svg>
        </button>
        <button className={'ctrl-btn' + (musicOn ? ' music-on' : '')}
          title={musicOn ? 'Mute Music' : 'Play Music'}
          onClick={() => setMusicOn(v => !v)}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 13V5l8-2.5v8" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
            <circle cx="4" cy="13" r="2" stroke="currentColor" strokeWidth="1.4"/>
            <circle cx="12" cy="10.5" r="2" stroke="currentColor" strokeWidth="1.4"/>
          </svg>
        </button>
        {!visitMode && <button className={'ctrl-btn' + (connectMode ? ' connect-mode-active' : '')}
          title={connectMode ? 'Exit Connect Mode' : 'Connect Stars'}
          onClick={() => {
            if (connectMode) {
              connectModeRef.current = false;
              setConnectMode(false);
              connectingFromRef.current = null;
              setConnectingFrom(null);
            } else {
              connectModeRef.current = true;
              setConnectMode(true);
            }
          }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <line x1="2" y1="14" x2="7" y2="3" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
            <line x1="7" y1="3" x2="14" y2="11" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
            <circle cx="2" cy="14" r="1.5" fill="currentColor"/>
            <circle cx="7" cy="3" r="1.5" fill="currentColor"/>
            <circle cx="14" cy="11" r="1.5" fill="currentColor"/>
          </svg>
          <span>{connectMode ? 'Exit' : 'Connect'}</span>
        </button>}
        {!visitMode && <button className="ctrl-btn" title="Explore another garden"
          onClick={() => { setShowVisitModal(true); setVisitError(''); setVisitInput(''); }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="5.5" stroke="currentColor" strokeWidth="1.4"/>
            <path d="M8 2.5 C5.5 5 5.5 11 8 13.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" fill="none"/>
            <path d="M8 2.5 C10.5 5 10.5 11 8 13.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" fill="none"/>
            <path d="M2.5 8 h11" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
          <span>Explore</span>
        </button>}
        {!visitMode && <button className="ctrl-btn" title="Wander into a random garden" onClick={enterRandomGarden}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M1 5h3l2 2-2 2H1" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M15 5h-3l-2 2 2 2h3" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M1 11l3.5-3.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
            <path d="M15 11l-3.5-3.5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round"/>
            <circle cx="8" cy="7" r="1.5" fill="currentColor"/>
          </svg>
          <span>Wander</span>
        </button>}
      </div>

      {/* 控制面板 */}
      {showControls && (
        <div className="ctrl-panel">
          <div className="ctrl-panel-hd">
            <span>Control Panel</span>
            <button onClick={() => setShowControls(false)}>✕</button>
          </div>
          <div className="ctrl-panel-body">
            <div className="ctrl-section">Theme</div>
            <div className="theme-chips">
              {themeKeys.map(k => (
                <button key={k}
                  className={'theme-chip' + (t.theme === k ? ' on' : '')}
                  onClick={() => setTweak('theme', k)}
                  style={{ '--c1': `hsl(${THEMES[k].hues[0]},80%,55%)`, '--c2': `hsl(${THEMES[k].hues[1]},80%,55%)` }}>
                  <span className="theme-swatch" />
                  <span className="theme-label">{THEMES[k].label}</span>
                </button>
              ))}
            </div>

            <div className="ctrl-section">Nebula Intensity</div>
            <input type="range" min="0" max="2" step="0.05" value={t.nebulaIntensity}
              onChange={e => setTweak('nebulaIntensity', +e.target.value)} />

            <div className="ctrl-section">Twinkle Speed</div>
            <input type="range" min="0.2" max="3" step="0.1" value={t.twinkleSpeed}
              onChange={e => setTweak('twinkleSpeed', +e.target.value)} />

            <div className="ctrl-section">Glow Radius</div>
            <input type="range" min="0.4" max="2.4" step="0.05" value={t.glowRadius}
              onChange={e => setTweak('glowRadius', +e.target.value)} />

            <div className="ctrl-section">Orbit Speed</div>
            <input type="range" min="0.2" max="3" step="0.1" value={t.orbitSpeed}
              onChange={e => setTweak('orbitSpeed', +e.target.value)} />

            <div className="ctrl-section">Particle Count</div>
            <input type="range" min="20" max="160" step="5" value={t.burstCount}
              onChange={e => setTweak('burstCount', +e.target.value)} />

            <div className="ctrl-section">Trail Decay</div>
            <input type="range" min="0.01" max="0.2" step="0.005" value={t.trailDecay}
              onChange={e => setTweak('trailDecay', +e.target.value)} />

            <div className="ctrl-row">
              <span>Cursor Stardust</span>
              <button className={'mini-toggle' + (t.cursorTrail ? ' on' : '')}
                onClick={() => setTweak('cursorTrail', !t.cursorTrail)}>
                <i />
              </button>
            </div>

            <div className="ctrl-section">Constellation Lines</div>
            <div className="ctrl-row">
              <span>Show Lines</span>
              <button className={'mini-toggle' + (t.constellationEnabled ? ' on' : '')}
                onClick={() => setTweak('constellationEnabled', !t.constellationEnabled)}>
                <i />
              </button>
            </div>
            <div className="ctrl-row" style={{ flexDirection: 'column', alignItems: 'stretch', gap: '6px' }}>
              <span>Line Distance</span>
              <input type="range" min="120" max="500" step="10" value={t.constellationDistance}
                onChange={e => setTweak('constellationDistance', +e.target.value)} />
            </div>

            <button className="ctrl-danger" onClick={() => {
              if (confirm('Clear all stars? This cannot be undone.')) {
                localStorage.removeItem(GARDEN_KEY(userId));
                localStorage.removeItem(CONN_KEY(userId));
                /* 同步清空服务器 */
                fetch('/api/garden/' + userId, {
                  method: 'PUT',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ stars: [], connections: [] }),
                }).catch(() => {}).finally(() => location.reload());
              }
            }}>Clear All Stars</button>
          </div>
        </div>
      )}

      {/* HUD */}
      <footer className="hud">
        <span className="hud-count">{count} {count === 1 ? 'wish' : 'wishes'} shining here</span>
        <span className="hud-hint">
          {connectMode
            ? (connectingFrom
                ? 'Click another star to connect · Click same pair to remove · Click a line to delete · Esc to cancel'
                : 'Click two stars to connect · Click a line to delete · Esc to exit')
            : 'Click to plant · Click stars to view · Drag to pan · Scroll to zoom · Move mouse to rotate'}
        </span>
      </footer>

      {/* 新手提示 */}
      {hint && t.showHint && count === 0 && (
        <div className="hint-bubble">
          <span className="hint-dot" />Tap anywhere to plant your first star
        </div>
      )}

      {/* ── 种星弹窗 ── */}
      {planting && (
        <div className="modal-bd" onClick={() => setPlanting(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-glow" />
            <h2>Plant a Star</h2>
            <p className="modal-sub">Let it shine here for you</p>
            <label>Your Name</label>
            <input autoFocus type="text" maxLength={24} value={planterName}
              placeholder="Your name / Anonymous"
              onChange={e => setPlanterName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && submitStar()} />
            <label>Wish (optional)</label>
            <textarea maxLength={140} value={message}
              placeholder="Write a wish for your star"
              onChange={e => setMessage(e.target.value)} />
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => setPlanting(null)}>Cancel</button>
              <button className="btn-primary" onClick={submitStar}>Plant ✦</button>
            </div>
          </div>
        </div>
      )}

      {/* ── 添加伴星弹窗 ── */}
      {pendingCompanion && (
        <div className="modal-bd" onClick={() => { setPendingCompanion(null); setCompanionMessage(''); }}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-glow companion" />
            <h2>Binary Star</h2>
            <p className="modal-sub">Send a companion into <em>{pendingCompanion.host.planter}</em>'s orbit</p>
            <div className="companion-preview">
              <span className="cp-host" />
              <span className="cp-orbit" />
              <span className="cp-comp" />
            </div>
            <label>Message (optional)</label>
            <textarea maxLength={140} value={companionMessage}
              placeholder="Write a message for this companion"
              onChange={e => setCompanionMessage(e.target.value)} />
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => { setPendingCompanion(null); setCompanionMessage(''); }}>Cancel</button>
              <button className="btn-primary" onClick={submitCompanion}>Form Binary ✦</button>
            </div>
          </div>
        </div>
      )}

      {/* ── 星星信息卡 ── */}
      {selected && (
        <div className="card-bd" onClick={() => setSelected(null)}>
          <div className="info-card" onClick={e => e.stopPropagation()}
            style={{ '--star-hue': selected.hue }}>
            <div className="info-glow" />
            <div className="info-star" />
            <div className="info-meta">
              <span className="info-by">Planted by</span>
              <h3>{selected.planter}</h3>
              {selected.message && <p>"{selected.message}"</p>}
              <time>{new Date(selected.bornAt).toLocaleString('zh-CN', {
                month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
              })}</time>
              {selected.companions.length > 0 && (
                <div style={{ marginTop: '14px' }}>
                  {selected.companions.map((c, i) => (
                    <div key={i} style={{ marginTop: '8px' }}>
                      <span className="info-companions">✦ Companion {i + 1}</span>
                      {c.message && (
                        <p style={{ fontSize: '13px', color: 'var(--ink-soft)', marginTop: '4px', fontFamily: 'var(--serif-zh)', lineHeight: 1.6 }}>
                          "{c.message}"
                        </p>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
            {/* 手工连线信息 */}
            {fieldRef.current && (function() {
              var field = fieldRef.current;
              var starConns = [];
              for (var i = 0; i < field.connections.length; i++) {
                var c = field.connections[i];
                if (c.starA === selected.id || c.starB === selected.id) starConns.push(c);
              }
              if (starConns.length === 0) return null;
              var items = [];
              for (var j = 0; j < starConns.length; j++) {
                var conn = starConns[j];
                var otherId = conn.starA === selected.id ? conn.starB : conn.starA;
                var otherStar = null;
                for (var k = 0; k < field.stars.length; k++) {
                  if (field.stars[k].id === otherId) { otherStar = field.stars[k]; break; }
                }
                (function(c, o) {
                  items.push(
                    React.createElement('div', {
                      key: c.id,
                      style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                               padding: '6px 0', fontSize: '12px', color: 'var(--ink-soft)',
                               borderBottom: '0.5px solid var(--hairline)' }
                    },
                      React.createElement('span', null,
                        React.createElement('span', {
                          style: { display: 'inline-block', width: '6px', height: '6px',
                                   borderRadius: '50%', marginRight: '8px',
                                   background: o ? 'hsl(' + o.hue + ',100%,70%)' : '#555',
                                   boxShadow: o ? '0 0 6px hsl(' + o.hue + ',100%,70%)' : 'none' }
                        }),
                        o ? o.planter : '(deleted star)'
                      ),
                      React.createElement('button', {
                        onClick: function() { if (fieldRef.current) fieldRef.current.removeConnection(c.id); },
                        style: { background: 'rgba(255,255,255,0.05)', border: '0.5px solid rgba(255,255,255,0.15)',
                                 color: 'var(--ink-mute)', borderRadius: '6px', cursor: 'pointer',
                                 fontSize: '10px', padding: '3px 10px' }
                      }, 'Remove')
                    )
                  );
                })(conn, otherStar);
              }
              return React.createElement('div', { style: { position: 'relative', marginTop: '16px' } },
                React.createElement('div', {
                  style: { fontSize: '10px', letterSpacing: '0.2em', textTransform: 'uppercase',
                           color: 'var(--ink-mute)', marginBottom: '8px' }
                }, 'Constellation Lines (' + starConns.length + ')'),
                items
              );
            })()}
            {/* 添加伴星按钮 */}
            <div style={{ textAlign: 'center', marginTop: '20px', position: 'relative' }}>
              <button className="btn-primary" style={{ fontSize: '12px', padding: '8px 18px' }}
                onClick={() => openCompanion(selected)}>
                ✦ Add Companion
              </button>
            </div>
            <button className="info-x" onClick={() => setSelected(null)}>✕</button>
          </div>
        </div>
      )}

      {/* ── 我的星空编号 ── */}
      {!visitMode && (
        <div className="my-id-badge">
          <span className="id-label">Garden ID</span>
          <span className="id-code">{userId}</span>
          <button
            className={'id-copy-btn' + (idCopied ? ' copied' : '')}
            onClick={() => {
              navigator.clipboard.writeText(userId).catch(() => {});
              setIdCopied(true);
              setTimeout(() => setIdCopied(false), 2000);
            }}>
            {idCopied ? '✓ Copied' : 'Copy'}
          </button>
        </div>
      )}

      {/* ── 访客模式浮条 ── */}
      {visitMode && (
        <div className="visit-banner">
          <span className="visit-icon">✦</span>
          <span className="visit-who">Visiting <strong>{visitingId}</strong></span>
          <span className="visit-divider" />
          <span className="visit-hint-text">Read-only · companions welcome</span>
          <button className="visit-return-btn" onClick={exitVisitMode}>↩ Return Home</button>
        </div>
      )}

      {/* ── 访客提示 Toast ── */}
      {showToast && (
        <div className="visit-toast">✦ Visitors can only leave companion stars</div>
      )}

      {/* ── 探索星空弹窗 ── */}
      {showVisitModal && (
        <div className="modal-bd" onClick={() => setShowVisitModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-glow explore" />
            <h2>Explore a Garden</h2>
            <p className="modal-sub">Enter a garden ID to drift through another's stars</p>
            <label>Garden ID</label>
            <input
              autoFocus
              className="mono-input"
              type="text"
              maxLength={8}
              value={visitInput}
              placeholder="e.g. CYG-3301"
              onChange={e => { setVisitInput(e.target.value.toUpperCase()); setVisitError(''); }}
              onKeyDown={e => e.key === 'Enter' && enterVisitMode(visitInput)}
            />
            {visitError && <p className="visit-error">{visitError}</p>}
            <p style={{ fontSize: '12px', color: 'var(--ink-mute)', marginTop: '-10px', marginBottom: '20px', lineHeight: 1.6 }}>
              Your ID: <span style={{ color: 'hsla(185,80%,78%,1)', fontFamily: 'Space Grotesk, monospace', letterSpacing: '0.12em' }}>{userId}</span>
              <br/>Share it with others so they can visit your garden.
            </p>
            <div className="modal-actions" style={{ flexDirection: 'column', gap: '10px' }}>
              <div style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end', width: '100%' }}>
                <button className="btn-ghost" onClick={() => setShowVisitModal(false)}>Cancel</button>
                <button className="btn-primary" onClick={() => enterVisitMode(visitInput)}>
                  Enter Garden ✦
                </button>
              </div>
              <button className="btn-ghost" style={{ width: '100%', textAlign: 'center', borderColor: 'hsla(185,60%,55%,0.3)', color: 'hsla(185,80%,78%,1)' }}
                onClick={() => { setShowVisitModal(false); enterRandomGarden(); }}>
                ✦ Wander into a stranger's sky
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── 虫洞过场 ── */}
      {wormhole && (
        <div className={`wormhole wh-${wormhole}`}>
          <div className="wh-core" />
          <div className="wh-ring" />
          <div className="wh-ring" />
          <div className="wh-ring" />
          <div className="wh-ring" />
          <div className="wh-ring" />
        </div>
      )}

      <audio ref={audioRef} src="cornfield-chase.mp3" loop preload="auto" />
    </>
  );
}

/* 辅助：随机数（供 openCompanion 用） */
function rand(a, b) { return a + Math.random() * (b - a); }

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
